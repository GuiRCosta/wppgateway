<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WPP Gateway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            oswald: ['Oswald', 'sans-serif'],
            space: ['Space Grotesk', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
</head>
<body class="min-h-screen font-space bg-[#E6E6E6] dark:bg-[#1a1a1a] text-neutral-950 dark:text-neutral-100 antialiased" x-data x-init="$store.theme.init(); await $store.auth.init(); $store.router.init()">

  <!-- TOAST NOTIFICATIONS -->
  <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 max-w-sm">
    <template x-for="toast in $store.toast.items" :key="toast.id">
      <div :class="[
        toast.removing ? 'animate-slide-out' : 'animate-slide-in',
        toast.type === 'success' ? 'bg-emerald-900 text-emerald-100' : '',
        toast.type === 'error' ? 'bg-red-900 text-red-100' : '',
        toast.type === 'warning' ? 'bg-yellow-900 text-yellow-100' : '',
        toast.type === 'info' ? 'bg-neutral-800 text-neutral-100' : '',
      ]" class="rounded-xl px-4 py-3 shadow-lg text-sm font-medium flex items-center gap-3">
        <template x-if="toast.type === 'success'">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </template>
        <template x-if="toast.type === 'error'">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </template>
        <span x-text="toast.message"></span>
        <button @click="$store.toast.dismiss(toast.id)" class="ml-auto opacity-60 hover:opacity-100">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </template>
  </div>

  <!-- CONFIRM MODAL -->
  <div x-show="$store.ui.modalOpen" x-transition.opacity class="fixed inset-0 z-[90] flex items-center justify-center bg-black/40 backdrop-blur-sm" @click.self="$store.ui.closeModal()">
    <div class="bg-[#E6E6E6] dark:bg-neutral-900 rounded-2xl p-6 shadow-2xl max-w-md w-full mx-4 animate-scale-in border border-neutral-300 dark:border-neutral-700">
      <p class="text-sm text-neutral-700 dark:text-neutral-300 mb-6" x-text="$store.ui.modalContent"></p>
      <div class="flex gap-3 justify-end">
        <button @click="$store.ui.closeModal()" class="px-5 py-2 rounded-full border border-neutral-400 dark:border-neutral-600 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" x-text="t('cancel')"></button>
        <button @click="$store.ui.executeConfirm()" class="px-5 py-2 rounded-full bg-red-600 text-white text-xs font-semibold uppercase tracking-widest hover:bg-red-700 transition-colors" x-text="t('confirm')"></button>
      </div>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <div x-show="$store.router.page === 'login'" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md" x-data="loginPage()">
      <div class="text-center mb-10">
        <div class="flex items-center justify-center gap-2 mb-6">
          <div class="flex gap-1">
            <div class="w-3 h-8 bg-neutral-950 dark:bg-neutral-100 rounded-full"></div>
            <div class="w-3 h-5 bg-neutral-950 dark:bg-neutral-100 rounded-full"></div>
            <div class="w-3 h-8 bg-neutral-950 dark:bg-neutral-100 rounded-full"></div>
          </div>
        </div>
        <h1 class="text-4xl font-oswald font-medium tracking-tight mb-2">WPP GATEWAY</h1>
        <p class="text-xs uppercase tracking-widest text-neutral-500 dark:text-neutral-400">WhatsApp Gateway Manager</p>
      </div>

      <!-- Language & Theme toggles on login page -->
      <div class="flex justify-center gap-3 mb-6">
        <button @click="$store.lang.toggle()" class="px-3 py-1.5 rounded-full border border-neutral-400 dark:border-neutral-600 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" x-text="$store.lang.current === 'pt' ? 'EN' : 'PT'"></button>
        <button @click="$store.theme.toggle()" class="p-1.5 rounded-full border border-neutral-400 dark:border-neutral-600 hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors">
          <svg x-show="!$store.theme.dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
          <svg x-show="$store.theme.dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
        </button>
      </div>

      <!-- Login Tab -->
      <div class="bg-neutral-200/50 dark:bg-neutral-800/50 rounded-2xl border border-neutral-300 dark:border-neutral-700 p-6">
        <div class="flex gap-4 mb-6">
          <button @click="tab = 'login'" :class="tab === 'login' ? 'bg-neutral-950 dark:bg-neutral-100 text-white dark:text-neutral-950' : 'text-neutral-600 dark:text-neutral-400 hover:bg-neutral-300 dark:hover:bg-neutral-700'" class="flex-1 px-4 py-2 rounded-full text-xs font-semibold uppercase tracking-widest transition-colors" x-text="t('login')"></button>
          <button @click="tab = 'register'" :class="tab === 'register' ? 'bg-neutral-950 dark:bg-neutral-100 text-white dark:text-neutral-950' : 'text-neutral-600 dark:text-neutral-400 hover:bg-neutral-300 dark:hover:bg-neutral-700'" class="flex-1 px-4 py-2 rounded-full text-xs font-semibold uppercase tracking-widest transition-colors" x-text="t('register')"></button>
        </div>

        <!-- Login Form -->
        <form x-show="tab === 'login'" @submit.prevent="doLogin()" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('api_key')"></label>
            <div class="relative">
              <input :type="showKey ? 'text' : 'password'" x-model="apiKey" :placeholder="t('enter_api_key')"
                class="w-full px-4 py-3 rounded-xl bg-[#E6E6E6] dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-600 text-sm font-space focus:outline-none focus:border-neutral-500 focus:ring-1 focus:ring-neutral-500 transition-colors dark:text-neutral-100 dark:placeholder-neutral-500" required/>
              <button type="button" @click="showKey = !showKey" class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300">
                <svg x-show="!showKey" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <svg x-show="showKey" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" :disabled="loading" class="w-full group transition-all duration-300 overflow-hidden font-medium text-neutral-200 bg-gradient-to-r from-neutral-700 to-neutral-800 rounded-full py-3 relative btn-press" style="box-shadow: 0 15px 33px -12px rgba(38,38,38,0.7), inset 0 4px 6.3px rgba(82,82,82,0.5), inset 0 -5px 6.3px rgba(23,23,23,0.8)">
            <div class="group-hover:translate-y-0 transition-transform duration-300 bg-white/10 absolute inset-0 translate-y-full"></div>
            <span class="relative flex items-center justify-center gap-2 text-xs font-semibold tracking-widest uppercase">
              <template x-if="loading"><span class="animate-pulse-soft" x-text="t('connecting')"></span></template>
              <template x-if="!loading">
                <span class="flex items-center gap-2"><span x-text="t('connect')"></span> <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-7-7 7 7-7 7"/></svg></span>
              </template>
            </span>
          </button>
        </form>

        <!-- Register Form -->
        <form x-show="tab === 'register'" @submit.prevent="doRegister()" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('tenant_name')"></label>
            <input type="text" x-model="tenantName" placeholder="Minha Empresa" class="w-full px-4 py-3 rounded-xl bg-[#E6E6E6] dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-600 text-sm font-space focus:outline-none focus:border-neutral-500 focus:ring-1 focus:ring-neutral-500 transition-colors dark:text-neutral-100 dark:placeholder-neutral-500" required/>
          </div>
          <button type="submit" :disabled="loading" class="w-full px-5 py-3 rounded-full border border-neutral-400 dark:border-neutral-600 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors btn-press">
            <template x-if="loading"><span class="animate-pulse-soft" x-text="t('creating')"></span></template>
            <template x-if="!loading"><span x-text="t('create_account')"></span></template>
          </button>
          <!-- Show generated key -->
          <div x-show="generatedKey" class="mt-4 p-4 bg-emerald-50 dark:bg-emerald-900/30 rounded-xl border border-emerald-200 dark:border-emerald-800">
            <p class="text-xs font-semibold uppercase tracking-widest text-emerald-800 dark:text-emerald-300 mb-2" x-text="t('save_api_key')"></p>
            <div class="flex items-center gap-2">
              <code class="flex-1 text-xs bg-white dark:bg-neutral-800 px-3 py-2 rounded-lg border dark:border-neutral-700 break-all" x-text="generatedKey"></code>
              <button @click="copyToClipboard(generatedKey)" class="p-2 rounded-lg hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors">
                <svg class="w-4 h-4 text-emerald-700 dark:text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- APP LAYOUT (authenticated) -->
  <div x-show="$store.auth.authenticated && $store.router.page !== 'login'" class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside :class="[
      $store.ui.sidebarCollapsed ? 'w-16' : 'w-64',
      $store.ui.sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'
    ]" class="fixed lg:sticky top-0 h-screen bg-neutral-950 text-white z-50 sidebar-transition flex flex-col overflow-hidden">
      <!-- Logo -->
      <div class="px-4 py-5 flex items-center gap-3 border-b border-white/10">
        <div class="flex gap-1 shrink-0">
          <div class="w-2 h-6 bg-white rounded-full"></div>
          <div class="w-2 h-4 bg-white rounded-full"></div>
          <div class="w-2 h-6 bg-white rounded-full"></div>
        </div>
        <span x-show="!$store.ui.sidebarCollapsed" class="text-sm font-oswald font-medium tracking-wider uppercase">WPP Gateway</span>
      </div>

      <!-- Nav Links -->
      <nav class="flex-1 py-4 px-2 space-y-1 overflow-y-auto">
        <p x-show="!$store.ui.sidebarCollapsed" class="px-3 mb-2 text-[0.6rem] font-semibold uppercase tracking-widest text-neutral-500" x-text="t('overview')"></p>
        <a @click.prevent="$store.router.navigate('dashboard')" href="#/dashboard" :class="$store.router.page === 'dashboard' ? 'bg-white/10 text-white' : 'text-neutral-400 hover:text-white hover:bg-white/5'" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-colors cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg>
          <span x-show="!$store.ui.sidebarCollapsed" x-text="t('dashboard')"></span>
        </a>

        <p x-show="!$store.ui.sidebarCollapsed" class="px-3 mt-6 mb-2 text-[0.6rem] font-semibold uppercase tracking-widest text-neutral-500" x-text="t('messaging')"></p>
        <a @click.prevent="$store.router.navigate('groups')" href="#/groups" :class="$store.router.page === 'groups' || $store.router.page === 'group-detail' || $store.router.page === 'instance-detail' ? 'bg-white/10 text-white' : 'text-neutral-400 hover:text-white hover:bg-white/5'" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-colors cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
          <span x-show="!$store.ui.sidebarCollapsed" x-text="t('groups')"></span>
        </a>
        <a @click.prevent="$store.router.navigate('broadcasts')" href="#/broadcasts" :class="$store.router.page === 'broadcasts' || $store.router.page === 'broadcast-detail' ? 'bg-white/10 text-white' : 'text-neutral-400 hover:text-white hover:bg-white/5'" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-colors cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46"/></svg>
          <span x-show="!$store.ui.sidebarCollapsed" x-text="t('broadcasts')"></span>
        </a>

        <p x-show="!$store.ui.sidebarCollapsed" class="px-3 mt-6 mb-2 text-[0.6rem] font-semibold uppercase tracking-widest text-neutral-500" x-text="t('resources')"></p>
        <a @click.prevent="$store.router.navigate('logs')" href="#/logs" :class="$store.router.page === 'logs' ? 'bg-white/10 text-white' : 'text-neutral-400 hover:text-white hover:bg-white/5'" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-colors cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/></svg>
          <span x-show="!$store.ui.sidebarCollapsed" x-text="t('logs')"></span>
        </a>
        <a href="/docs" target="_blank" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-neutral-400 hover:text-white hover:bg-white/5 transition-colors cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
          <span x-show="!$store.ui.sidebarCollapsed" x-text="t('api_docs')"></span>
        </a>
      </nav>

      <!-- Bottom: Account -->
      <div class="border-t border-white/10 px-3 py-4">
        <div x-show="!$store.ui.sidebarCollapsed" class="flex items-center justify-between">
          <div class="min-w-0">
            <p class="text-xs font-medium truncate" x-text="$store.auth.tenant?.name || 'Tenant'"></p>
            <p class="text-[0.6rem] text-neutral-500 uppercase tracking-widest" x-text="$store.auth.tenant?.plan || 'free'"></p>
          </div>
          <button @click="$store.auth.logout()" class="p-2 rounded-lg text-neutral-400 hover:text-white hover:bg-white/10 transition-colors" :title="t('logout')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
          </button>
        </div>
        <button x-show="$store.ui.sidebarCollapsed" @click="$store.auth.logout()" class="p-2 rounded-lg text-neutral-400 hover:text-white hover:bg-white/10 transition-colors w-full flex justify-center" :title="t('logout')">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
        </button>
      </div>
    </aside>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div x-show="$store.ui.sidebarOpen && window.innerWidth < 1024" @click="$store.ui.sidebarOpen = false" class="fixed inset-0 bg-black/30 z-40 lg:hidden"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 min-w-0">
      <!-- Top Bar -->
      <header class="sticky top-0 z-30 bg-[#E6E6E6]/95 dark:bg-[#1a1a1a]/95 backdrop-blur-sm border-b border-neutral-300 dark:border-neutral-700 px-4 lg:px-8 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button @click="$store.ui.toggleSidebar()" class="p-2 rounded-xl hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
          </button>
          <h2 class="text-lg font-oswald font-medium tracking-tight capitalize" x-text="$store.router.page.replace('-', ' ')"></h2>
        </div>
        <div class="flex items-center gap-3">
          <!-- Language Toggle -->
          <button @click="$store.lang.toggle()" class="px-3 py-1.5 rounded-full border border-neutral-300 dark:border-neutral-600 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" x-text="$store.lang.current === 'pt' ? 'EN' : 'PT'" :title="t('language')"></button>
          <!-- Dark Mode Toggle -->
          <button @click="$store.theme.toggle()" class="p-2 rounded-xl border border-neutral-300 dark:border-neutral-600 hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" :title="$store.theme.dark ? t('light_mode') : t('dark_mode')">
            <svg x-show="!$store.theme.dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
            <svg x-show="$store.theme.dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
          </button>
          <span class="text-xs text-neutral-500 dark:text-neutral-400 uppercase tracking-widest hidden sm:block" x-text="$store.auth.tenant?.name"></span>
          <div class="w-8 h-8 rounded-full bg-neutral-950 dark:bg-neutral-700 text-white flex items-center justify-center text-xs font-semibold" x-text="($store.auth.tenant?.name || 'U')[0].toUpperCase()"></div>
        </div>
      </header>

      <!-- Page Content -->
      <div class="p-4 lg:p-8">

        <!-- DASHBOARD PAGE -->
        <div x-show="$store.router.page === 'dashboard'" x-data="dashboardPage()" x-effect="if($store.router.page === 'dashboard' && $store.auth.authenticated) load()">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <template x-for="card in cards" :key="card.label">
              <div class="bg-neutral-200/50 dark:bg-neutral-800/50 rounded-2xl border border-neutral-300 dark:border-neutral-700 p-5 card-hover">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-[0.65rem] font-semibold uppercase tracking-widest text-neutral-500 dark:text-neutral-400" x-text="card.label"></span>
                  <div class="w-8 h-8 rounded-lg bg-neutral-300/50 dark:bg-neutral-700/50 flex items-center justify-center" x-html="card.icon"></div>
                </div>
                <p class="text-3xl font-oswald font-medium tracking-tight" x-text="card.value"></p>
                <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-1" x-text="card.sub"></p>
              </div>
            </template>
          </div>
          <!-- Quick Actions -->
          <div class="bg-neutral-200/50 dark:bg-neutral-800/50 rounded-2xl border border-neutral-300 dark:border-neutral-700 p-6">
            <h3 class="text-sm font-semibold uppercase tracking-widest text-neutral-800 dark:text-neutral-200 mb-4" x-text="t('quick_actions')"></h3>
            <div class="flex flex-wrap gap-3">
              <button @click="$store.router.navigate('groups')" class="px-5 py-2 rounded-full border border-neutral-400 dark:border-neutral-600 text-[0.7rem] font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" x-text="t('view_groups')"></button>
              <button @click="$store.router.navigate('broadcasts')" class="px-5 py-2 rounded-full border border-neutral-400 dark:border-neutral-600 text-[0.7rem] font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" x-text="t('broadcasts')"></button>
            </div>
          </div>
        </div>

        <!-- GROUPS PAGE -->
        <div x-show="$store.router.page === 'groups'" x-data="groupsPage()" x-effect="if($store.router.page === 'groups' && $store.auth.authenticated) load()">
          <!-- Header -->
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div class="flex items-center gap-3">
              <input type="text" x-model="search" @input="filterGroups()" :placeholder="t('search_groups')" class="px-4 py-2 rounded-xl bg-neutral-200/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-700 text-sm focus:outline-none focus:border-neutral-500 w-64 dark:text-neutral-100 dark:placeholder-neutral-500"/>
            </div>
            <button @click="showCreate = true; resetForm()" class="group transition-all duration-300 overflow-hidden font-medium text-neutral-200 bg-gradient-to-r from-neutral-700 to-neutral-800 rounded-full py-2.5 px-6 relative btn-press" style="box-shadow: 0 15px 33px -12px rgba(38,38,38,0.7), inset 0 4px 6.3px rgba(82,82,82,0.5), inset 0 -5px 6.3px rgba(23,23,23,0.8)">
              <div class="group-hover:translate-y-0 transition-transform duration-300 bg-white/10 absolute inset-0 translate-y-full"></div>
              <span class="relative flex items-center gap-2 text-xs font-semibold tracking-widest uppercase">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                <span x-text="t('new_group')"></span>
              </span>
            </button>
          </div>

          <!-- Groups Grid -->
          <div x-show="!loading && filtered.length > 0" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="group in filtered" :key="group.id">
              <div class="bg-neutral-200/50 dark:bg-neutral-800/50 rounded-2xl border border-neutral-300 dark:border-neutral-700 p-5 card-hover cursor-pointer" @click="$store.router.navigate('group-detail', { groupId: group.id })">
                <div class="flex items-start justify-between mb-3">
                  <div class="min-w-0">
                    <h3 class="text-sm font-semibold truncate" x-text="group.name"></h3>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5" x-text="formatDate(group.created_at)"></p>
                  </div>
                  <div class="flex items-center gap-2 shrink-0">
                    <span :class="[getStrategyColor(group.strategy).bg, getStrategyColor(group.strategy).text]" class="px-2.5 py-1 rounded-full text-[0.6rem] font-semibold uppercase tracking-widest" x-text="getStrategyLabel(group.strategy)"></span>
                  </div>
                </div>
                <div class="flex items-center gap-4 text-xs text-neutral-600 dark:text-neutral-400">
                  <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/></svg>
                    <span x-text="(group._instanceCount || 0) + ' ' + t('instances')"></span>
                  </span>
                  <span class="flex items-center gap-1">
                    <div class="w-2 h-2 rounded-full" :class="group.is_active ? 'bg-emerald-500' : 'bg-neutral-400'"></div>
                    <span x-text="group.is_active ? t('active') : t('inactive')"></span>
                  </span>
                </div>
              </div>
            </template>
          </div>

          <!-- Empty State -->
          <div x-show="!loading && filtered.length === 0" class="text-center py-16">
            <svg class="w-16 h-16 text-neutral-300 dark:text-neutral-600 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
            <p class="text-sm text-neutral-500 dark:text-neutral-400 uppercase tracking-widest" x-text="t('no_groups')"></p>
            <p class="text-xs text-neutral-400 dark:text-neutral-500 mt-1" x-text="t('create_first_group')"></p>
          </div>

          <!-- Loading -->
          <div x-show="loading" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="i in 3">
              <div class="bg-neutral-200/50 dark:bg-neutral-800/50 rounded-2xl border border-neutral-300 dark:border-neutral-700 p-5">
                <div class="skeleton h-4 w-32 mb-3"></div>
                <div class="skeleton h-3 w-24 mb-4"></div>
                <div class="skeleton h-3 w-40"></div>
              </div>
            </template>
          </div>

          <!-- Create/Edit Modal -->
          <div x-show="showCreate" x-transition.opacity class="fixed inset-0 z-[80] flex items-center justify-center bg-black/40 backdrop-blur-sm" @click.self="showCreate = false">
            <div class="bg-[#E6E6E6] dark:bg-neutral-900 rounded-2xl p-6 shadow-2xl max-w-lg w-full mx-4 animate-scale-in border border-neutral-300 dark:border-neutral-700" @click.stop>
              <h3 class="text-lg font-oswald font-medium tracking-tight mb-6" x-text="editId ? t('edit_group') : t('new_group')"></h3>
              <form @submit.prevent="saveGroup()" class="space-y-4">
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('name')"></label>
                  <input type="text" x-model="form.name" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-600 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100" required/>
                </div>
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('strategy')"></label>
                  <select x-model="form.strategy" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-600 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100">
                    <option value="failover" x-text="t('failover_desc')"></option>
                    <option value="rotation" x-text="t('rotation_desc')"></option>
                    <option value="hybrid" x-text="t('hybrid_desc')"></option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('webhook_url_optional')"></label>
                  <input type="url" x-model="form.webhook_url" placeholder="https://..." class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-600 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100 dark:placeholder-neutral-500"/>
                </div>
                <div class="flex gap-3 justify-end pt-2">
                  <button type="button" @click="showCreate = false" class="px-5 py-2 rounded-full border border-neutral-400 dark:border-neutral-600 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" x-text="t('cancel')"></button>
                  <button type="submit" :disabled="saving" class="px-5 py-2 rounded-full bg-neutral-950 dark:bg-neutral-100 text-white dark:text-neutral-950 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-800 dark:hover:bg-neutral-300 transition-colors">
                    <span x-text="saving ? t('saving') : t('save')"></span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- GROUP DETAIL PAGE -->
        <div x-show="$store.router.page === 'group-detail'" x-data="groupDetailPage()" x-effect="if($store.router.page === 'group-detail') load($store.router.params.groupId)">
          <!-- Back + Title -->
          <div class="flex items-center gap-4 mb-6">
            <button @click="$store.router.navigate('groups')" class="p-2 rounded-xl hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
            </button>
            <div class="min-w-0 flex-1">
              <h2 class="text-2xl font-oswald font-medium tracking-tight" x-text="group?.name || t('loading')"></h2>
              <div class="flex items-center gap-3 mt-1">
                <span :class="[getStrategyColor(group?.strategy).bg, getStrategyColor(group?.strategy).text]" class="px-2.5 py-0.5 rounded-full text-[0.6rem] font-semibold uppercase tracking-widest" x-text="getStrategyLabel(group?.strategy)" x-show="group"></span>
                <span class="flex items-center gap-1 text-xs text-neutral-500 dark:text-neutral-400">
                  <div class="w-2 h-2 rounded-full" :class="group?.is_active ? 'bg-emerald-500' : 'bg-neutral-400'"></div>
                  <span x-text="group?.is_active ? t('active') : t('inactive')"></span>
                </span>
              </div>
            </div>
            <div class="flex gap-2">
              <button x-show="group?.is_active" @click="doPause()" class="px-4 py-2 rounded-full border border-yellow-400 text-yellow-700 dark:text-yellow-400 text-[0.7rem] font-semibold uppercase tracking-widest hover:bg-yellow-50 dark:hover:bg-yellow-900/20 transition-colors" x-text="t('pause')"></button>
              <button x-show="group && !group.is_active" @click="doResume()" class="px-4 py-2 rounded-full border border-emerald-400 text-emerald-700 dark:text-emerald-400 text-[0.7rem] font-semibold uppercase tracking-widest hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-colors" x-text="t('resume')"></button>
              <button @click="$store.ui.confirm(t('confirm_delete_group'), () => doDelete())" class="px-4 py-2 rounded-full border border-red-300 text-red-600 dark:text-red-400 text-[0.7rem] font-semibold uppercase tracking-widest hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" x-text="t('delete')"></button>
            </div>
          </div>

          <!-- Tabs -->
          <div class="flex gap-1 mb-6 overflow-x-auto border-b border-neutral-300 dark:border-neutral-700">
            <template x-for="tabKey in ['tab_instances', 'tab_metrics', 'tab_webhook', 'tab_blacklist']" :key="tabKey">
              <button @click="tab = tabKey" :class="tab === tabKey ? 'border-b-2 border-neutral-950 dark:border-neutral-100 text-neutral-950 dark:text-neutral-100' : 'text-neutral-500 dark:text-neutral-400 hover:text-neutral-700 dark:hover:text-neutral-300'" class="px-4 py-3 text-xs font-semibold uppercase tracking-widest whitespace-nowrap transition-colors" x-text="t(tabKey)"></button>
            </template>
          </div>

          <!-- Instances Tab -->
          <div x-show="tab === 'tab_instances'">
            <div class="flex justify-between items-center mb-4">
              <p class="text-xs text-neutral-500 dark:text-neutral-400 uppercase tracking-widest" x-text="instances.length + ' ' + t('instances')"></p>
              <button @click="showAddInstance = true; resetInstanceForm()" class="px-4 py-2 rounded-full bg-neutral-950 dark:bg-neutral-100 text-white dark:text-neutral-950 text-[0.7rem] font-semibold uppercase tracking-widest hover:bg-neutral-800 dark:hover:bg-neutral-300 transition-colors">
                <span class="flex items-center gap-2">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                  <span x-text="t('add')"></span>
                </span>
              </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
              <template x-for="inst in instances" :key="inst.id">
                <div class="bg-neutral-200/50 dark:bg-neutral-800/50 rounded-2xl border border-neutral-300 dark:border-neutral-700 p-5 card-hover">
                  <div class="flex items-start justify-between mb-3">
                    <div class="min-w-0">
                      <h4 class="text-sm font-semibold truncate" x-text="inst.display_name || t('instance_label')"></h4>
                      <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5" x-text="formatPhone(inst.phone_number)"></p>
                    </div>
                    <span :class="[getStatusColor(inst.status).bg, getStatusColor(inst.status).text]" class="px-2.5 py-1 rounded-full text-[0.6rem] font-semibold uppercase tracking-widest flex items-center gap-1.5 shrink-0">
                      <div class="w-1.5 h-1.5 rounded-full" :class="getStatusColor(inst.status).dot"></div>
                      <span x-text="getStatusLabel(inst.status)"></span>
                    </span>
                  </div>
                  <div class="grid grid-cols-2 gap-2 text-xs text-neutral-600 dark:text-neutral-400 mb-4">
                    <div><span class="text-neutral-400 dark:text-neutral-500" x-text="t('msgs_today') + ':'"></span> <span x-text="inst.messages_today || 0"></span>/<span x-text="inst.daily_budget || 0"></span></div>
                    <div><span class="text-neutral-400 dark:text-neutral-500" x-text="t('delivery') + ':'"></span> <span x-text="formatPercent(inst.delivery_rate)"></span></div>
                    <div><span class="text-neutral-400 dark:text-neutral-500" x-text="t('priority') + ':'"></span> <span x-text="inst.priority || 0"></span></div>
                    <div><span class="text-neutral-400 dark:text-neutral-500" x-text="t('budget_hour') + ':'"></span> <span x-text="inst.hourly_budget || 0"></span></div>
                  </div>
                  <div class="flex gap-2">
                    <button @click="$store.router.navigate('instance-detail', { groupId: $store.router.params.groupId, instanceId: inst.id })" class="flex-1 px-3 py-1.5 rounded-lg border border-neutral-300 dark:border-neutral-600 text-[0.65rem] font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors text-center" x-text="t('details')"></button>
                    <template x-if="inst.status === 'disconnected'">
                      <button @click="connectInst(inst.id)" class="flex-1 px-3 py-1.5 rounded-lg bg-emerald-600 text-white text-[0.65rem] font-semibold uppercase tracking-widest hover:bg-emerald-700 transition-colors text-center" x-text="t('connect_btn')"></button>
                    </template>
                    <template x-if="inst.status === 'available'">
                      <button @click="disconnectInst(inst.id)" class="flex-1 px-3 py-1.5 rounded-lg bg-neutral-600 text-white text-[0.65rem] font-semibold uppercase tracking-widest hover:bg-neutral-700 transition-colors text-center" x-text="t('disconnect')"></button>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <!-- Empty instances -->
            <div x-show="instances.length === 0 && !loading" class="text-center py-12">
              <svg class="w-12 h-12 text-neutral-300 dark:text-neutral-600 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/></svg>
              <p class="text-sm text-neutral-500 dark:text-neutral-400 uppercase tracking-widest" x-text="t('no_instances')"></p>
              <p class="text-xs text-neutral-400 dark:text-neutral-500 mt-1" x-text="t('add_instance_hint')"></p>
            </div>

            <!-- Add Instance Modal -->
            <div x-show="showAddInstance" x-transition.opacity class="fixed inset-0 z-[80] flex items-center justify-center bg-black/40 backdrop-blur-sm" @click.self="showAddInstance = false">
              <div class="bg-[#E6E6E6] dark:bg-neutral-900 rounded-2xl p-6 shadow-2xl max-w-lg w-full mx-4 animate-scale-in border border-neutral-300 dark:border-neutral-700" @click.stop>
                <h3 class="text-lg font-oswald font-medium tracking-tight mb-1" x-text="t('new_instance')"></h3>
                <p class="text-xs text-neutral-500 dark:text-neutral-400 mb-5">
                  <span x-show="group?.strategy === 'failover'" x-html="'<strong class=\'text-blue-600 dark:text-blue-400\'>' + t('failover') + '</strong> — ' + t('failover_strategy_desc').split('—')[1]"></span>
                  <span x-show="group?.strategy === 'rotation'" x-html="'<strong class=\'text-purple-600 dark:text-purple-400\'>' + t('rotation') + '</strong> — ' + t('rotation_strategy_desc').split('—')[1]"></span>
                  <span x-show="group?.strategy === 'hybrid'" x-html="'<strong class=\'text-orange-600 dark:text-orange-400\'>' + t('hybrid') + '</strong> — ' + t('hybrid_strategy_desc').split('—')[1]"></span>
                </p>
                <form @submit.prevent="addInstance()" class="space-y-4">
                  <div>
                    <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('name')"></label>
                    <input type="text" x-model="instForm.display_name" :placeholder="t('cell_placeholder')" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-600 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100 dark:placeholder-neutral-500"/>
                  </div>

                  <!-- Failover: prioridade e destaque -->
                  <template x-if="group?.strategy === 'failover'">
                    <div>
                      <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2"><span x-text="t('priority')"></span> <span class="text-blue-500" x-text="'(' + t('priority_main') + ')'"></span></label>
                      <input type="number" x-model.number="instForm.priority" min="1" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-600 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100"/>
                      <p class="text-[0.65rem] text-neutral-400 dark:text-neutral-500 mt-1.5" x-text="t('priority_hint')"></p>
                    </div>
                  </template>

                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182M2.985 14.652"/></svg>
                  </button>
                </div>
              </div>
            </template>
          </div>

          <div x-show="selectedGroup && broadcasts.length === 0 && !loading" class="text-center py-12">
            <p class="text-sm text-neutral-500 dark:text-neutral-400 uppercase tracking-widest" x-text="t('no_broadcasts')"></p>
          </div>
          <div x-show="!selectedGroup" class="text-center py-12">
            <p class="text-sm text-neutral-500 dark:text-neutral-400 uppercase tracking-widest" x-text="t('select_group_hint')"></p>
          </div>

          <!-- CREATE BROADCAST MODAL -->
          <div x-show="showCreate" x-transition.opacity class="fixed inset-0 z-[80] flex items-center justify-center bg-black/40 backdrop-blur-sm" @click.self="showCreate = false">
            <div class="bg-[#E6E6E6] dark:bg-neutral-900 rounded-2xl p-6 shadow-2xl max-w-lg w-full mx-4 animate-scale-in border border-neutral-300 dark:border-neutral-700 max-h-[90vh] overflow-y-auto" @click.stop>
              <h3 class="text-lg font-oswald font-medium tracking-tight mb-6" x-text="t('new_broadcast')"></h3>
              <form @submit.prevent="createBroadcast()" class="space-y-4">
                <!-- Message -->
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('message')"></label>
                  <textarea x-model="form.message" rows="4" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-600 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100 resize-none font-mono" :placeholder="t('message_text')" required></textarea>
                  <p class="text-[0.6rem] text-neutral-400 dark:text-neutral-500 mt-1">Spintax: {oi|ola|hey} — Variables: {{nome}}</p>
                </div>

                <!-- Recipients -->
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2">
                    <span x-text="t('recipients')"></span>
                    <span x-show="recipientCount > 0" class="ml-2 text-neutral-500">(<span x-text="recipientCount"></span>)</span>
                  </label>
                  <textarea x-model="form.recipients" @input="updateRecipientCount()" rows="5" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-600 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100 resize-none font-mono" :placeholder="t('recipients_hint')" required></textarea>
                </div>

                <!-- Options -->
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-600 dark:text-neutral-400 mb-2" x-text="t('options')"></label>
                  <div class="space-y-2">
                    <label class="flex items-center gap-3 text-sm text-neutral-700 dark:text-neutral-300 cursor-pointer select-none">
                      <input type="checkbox" x-model="form.shuffle" class="rounded border-neutral-400 dark:border-neutral-600">
                      <span x-text="t('shuffle_recipients')"></span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-neutral-700 dark:text-neutral-300 cursor-pointer select-none">
                      <input type="checkbox" x-model="form.spintax" class="rounded border-neutral-400 dark:border-neutral-600">
                      <span x-text="t('spintax')"></span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-neutral-700 dark:text-neutral-300 cursor-pointer select-none">
                      <input type="checkbox" x-model="form.skipInvalid" class="rounded border-neutral-400 dark:border-neutral-600">
                      <span x-text="t('skip_invalid')"></span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-neutral-700 dark:text-neutral-300 cursor-pointer select-none">
                      <input type="checkbox" x-model="form.skipNonWhatsapp" class="rounded border-neutral-400 dark:border-neutral-600">
                      <span x-text="t('skip_non_whatsapp')"></span>
                    </label>
                  </div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 justify-end pt-2">
                  <button type="button" @click="showCreate = false" class="px-5 py-2 rounded-full border border-neutral-400 dark:border-neutral-600 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors" x-text="t('cancel')"></button>
                  <button type="submit" :disabled="sending" class="px-5 py-2 rounded-full bg-neutral-950 dark:bg-neutral-100 text-white dark:text-neutral-950 text-xs font-semibold uppercase tracking-widest hover:bg-neutral-800 dark:hover:bg-neutral-300 transition-colors disabled:opacity-50">
                    <span x-text="sending ? t('sending') : t('new_broadcast')"></span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- LOGS PAGE -->
        <div x-show="$store.router.page === 'logs'" x-data="logsPage()" x-effect="if($store.router.page === 'logs' && $store.auth.authenticated) load()">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <h2 class="text-lg font-oswald font-semibold tracking-wide uppercase" x-text="t('system_logs')"></h2>
            <div class="flex items-center gap-3">
              <select x-model="levelFilter" @change="load(true)" class="px-3 py-2 rounded-xl bg-neutral-200/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-700 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100">
                <option value="" x-text="t('all_levels')"></option>
                <option value="debug">Debug</option>
                <option value="info">Info</option>
                <option value="warn">Warn</option>
                <option value="error">Error</option>
                <option value="fatal">Fatal</option>
              </select>
              <select x-model="limitFilter" @change="load(true)" class="px-3 py-2 rounded-xl bg-neutral-200/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-700 text-sm focus:outline-none focus:border-neutral-500 dark:text-neutral-100">
                <option value="50">50 <span x-text="t('lines')"></span></option>
                <option value="100">100 <span x-text="t('lines')"></span></option>
                <option value="200">200 <span x-text="t('lines')"></span></option>
                <option value="500">500 <span x-text="t('lines')"></span></option>
              </select>
              <label class="flex items-center gap-2 text-sm text-neutral-600 dark:text-neutral-400 cursor-pointer select-none">
                <input type="checkbox" x-model="autoRefresh" @change="toggleAutoRefresh()" class="rounded border-neutral-400 dark:border-neutral-600">
                <span x-text="t('auto_refresh')"></span>
              </label>
              <button @click="load(true)" class="flex items-center gap-2 px-4 py-2 bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 rounded-xl text-sm hover:bg-neutral-800 dark:hover:bg-neutral-300 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182M2.985 14.652"/></svg>
                <span x-text="t('refresh')"></span>
              </button>
            </div>
          </div>

          <!-- Stats -->
          <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
            <div class="bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 px-4 py-3">
              <p class="text-[0.6rem] font-semibold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1" x-text="t('total')"></p>
              <p class="text-xl font-oswald font-semibold" x-text="logs.length"></p>
            </div>
            <div class="bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 px-4 py-3">
              <p class="text-[0.6rem] font-semibold uppercase tracking-widest text-blue-500 mb-1">Info</p>
              <p class="text-xl font-oswald font-semibold text-blue-600 dark:text-blue-400" x-text="logs.filter(l => l.level === 'info').length"></p>
            </div>
            <div class="bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 px-4 py-3">
              <p class="text-[0.6rem] font-semibold uppercase tracking-widest text-amber-500 mb-1">Warn</p>
              <p class="text-xl font-oswald font-semibold text-amber-600 dark:text-amber-400" x-text="logs.filter(l => l.level === 'warn' || l.level === 'warning').length"></p>
            </div>
            <div class="bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 px-4 py-3">
              <p class="text-[0.6rem] font-semibold uppercase tracking-widest text-red-500 mb-1">Error</p>
              <p class="text-xl font-oswald font-semibold text-red-600 dark:text-red-400" x-text="logs.filter(l => l.level === 'error').length"></p>
            </div>
            <div class="bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 px-4 py-3">
              <p class="text-[0.6rem] font-semibold uppercase tracking-widest text-red-700 dark:text-red-500 mb-1">Fatal</p>
              <p class="text-xl font-oswald font-semibold text-red-800 dark:text-red-400" x-text="logs.filter(l => l.level === 'fatal').length"></p>
            </div>
          </div>

          <!-- Loading -->
          <div x-show="loading" class="text-center py-12">
            <div class="inline-block w-6 h-6 border-2 border-neutral-300 dark:border-neutral-600 border-t-neutral-900 dark:border-t-neutral-100 rounded-full animate-spin"></div>
          </div>

          <!-- Search -->
          <div x-show="!loading && logs.length > 0" class="mb-4">
            <input type="text" x-model="search" :placeholder="t('search_logs')" class="w-full px-4 py-2.5 rounded-xl bg-neutral-200/50 dark:bg-neutral-800/50 border border-neutral-300 dark:border-neutral-700 text-sm focus:outline-none focus:border-neutral-500 placeholder:text-neutral-400 dark:placeholder:text-neutral-500 dark:text-neutral-100">
          </div>

          <!-- Log entries -->
          <div x-show="!loading && filteredLogs().length > 0" class="bg-neutral-950 rounded-2xl border border-neutral-800 overflow-hidden">
            <div class="overflow-x-auto max-h-[70vh] overflow-y-auto font-mono text-xs">
              <template x-for="(log, idx) in filteredLogs()" :key="idx">
                <div class="flex border-b border-neutral-800/50 hover:bg-neutral-900 transition-colors cursor-pointer" @click="log._expanded = !log._expanded">
                  <div class="shrink-0 w-[180px] px-3 py-2 text-neutral-500" x-text="formatLogTime(log.timestamp)"></div>
                  <div class="shrink-0 w-[60px] px-2 py-2">
                    <span class="text-[0.6rem] font-bold uppercase px-1.5 py-0.5 rounded"
                      :class="{
                        'bg-blue-500/20 text-blue-400': log.level === 'info',
                        'bg-green-500/20 text-green-400': log.level === 'debug',
                        'bg-amber-500/20 text-amber-400': log.level === 'warn' || log.level === 'warning',
                        'bg-red-500/20 text-red-400': log.level === 'error',
                        'bg-red-700/30 text-red-300': log.level === 'fatal',
                      }"
                      x-text="log.level?.toUpperCase()"></span>
                  </div>
                  <div class="flex-1 px-2 py-2 text-neutral-200 break-all" x-text="log.message"></div>
                  <div class="shrink-0 w-[200px] px-2 py-2 text-neutral-600 truncate" x-text="log.caller || ''"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- Detail panel for expanded log -->
          <template x-for="(log, idx) in filteredLogs()" :key="'detail-' + idx">
            <div x-show="log._expanded" class="bg-neutral-900 rounded-xl border border-neutral-700 p-4 mt-1 mb-2 font-mono text-xs">
              <template x-if="log.fields && Object.keys(log.fields).length > 0">
                <div class="space-y-1">
                  <template x-for="key in Object.keys(log.fields)" :key="key">
                    <div class="flex gap-2">
                      <span class="text-cyan-400 shrink-0" x-text="key + ':'"></span>
                      <span class="text-neutral-300 break-all" x-text="typeof log.fields[key] === 'object' ? JSON.stringify(log.fields[key]) : String(log.fields[key])"></span>
                    </div>
                  </template>
                </div>
              </template>
              <p x-show="!log.fields || Object.keys(log.fields).length === 0" class="text-neutral-500" x-text="t('no_extra_fields')"></p>
            </div>
          </template>

          <!-- Empty state -->
          <div x-show="!loading && logs.length === 0" class="text-center py-16">
            <svg class="w-12 h-12 mx-auto text-neutral-300 dark:text-neutral-600 mb-4" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/></svg>
            <p class="text-sm font-semibold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1" x-text="t('no_logs')"></p>
            <p class="text-xs text-neutral-400 dark:text-neutral-500" x-text="t('logs_appear_hint')"></p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- PAGE COMPONENTS (Alpine.js) -->
  <script>
    function loginPage() {
      return {
        tab: 'login',
        apiKey: '',
        showKey: false,
        tenantName: '',
        generatedKey: '',
        loading: false,

        async doLogin() {
          if (!this.apiKey.trim()) return
          this.loading = true
          try {
            await Alpine.store('auth').login(this.apiKey.trim())
          } catch (err) {
            Alpine.store('toast').show('error', t('invalid_api_key'))
          } finally {
            this.loading = false
          }
        },

        async doRegister() {
          if (!this.tenantName.trim()) return
          this.loading = true
          try {
            const res = await Api.register(this.tenantName.trim())
            if (res.success && res.data?.api_key) {
              this.generatedKey = res.data.api_key
              Alpine.store('toast').show('success', t('account_created'))
            } else {
              Alpine.store('toast').show('error', res.error?.message || t('account_create_error'))
            }
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          } finally {
            this.loading = false
          }
        },
      }
    }

    function dashboardPage() {
      return {
        cards: [],
        loading: true,
        _loaded: false,

        async load() {
          if (this._loaded) return
          this._loaded = true
          this.loading = true
          try {
            const usage = await Api.getUsage()
            const d = usage?.data || {}
            this.cards = [
              { label: t('groups_label'), value: d.groups_count || 0, sub: t('total_groups'), icon: '<svg class="w-4 h-4 text-neutral-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584"/></svg>' },
              { label: t('instances_label'), value: d.instances_count || 0, sub: t('total_instances'), icon: '<svg class="w-4 h-4 text-neutral-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3"/></svg>' },
              { label: t('available_label'), value: d.available_count || 0, sub: t('active_instances'), icon: '<svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' },
              { label: t('banned_label'), value: d.banned_count || 0, sub: t('banned_instances'), icon: '<svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>' },
            ]
          } catch (err) {
            Alpine.store('toast').show('error', t('dashboard_load_error'))
          } finally {
            this.loading = false
          }
        },
      }
    }

    function groupsPage() {
      return {
        groups: [],
        filtered: [],
        search: '',
        loading: true,
        _loaded: false,
        showCreate: false,
        saving: false,
        editId: null,
        form: { name: '', strategy: 'failover', webhook_url: '' },

        async load(force) {
          if (this._loaded && !force) return
          this._loaded = true
          this.loading = true
          try {
            const res = await Api.listGroups()
            this.groups = res?.data || []
            this.filtered = [...this.groups]
          } catch (err) {
            Alpine.store('toast').show('error', t('groups_load_error'))
          } finally {
            this.loading = false
          }
        },

        filterGroups() {
          const q = this.search.toLowerCase()
          this.filtered = this.groups.filter(g => g.name.toLowerCase().includes(q))
        },

        resetForm() {
          this.form = { name: '', strategy: 'failover', webhook_url: '' }
          this.editId = null
        },

        async saveGroup() {
          this.saving = true
          try {
            if (this.editId) {
              await Api.updateGroup(this.editId, this.form)
              Alpine.store('toast').show('success', t('group_updated'))
            } else {
              await Api.createGroup(this.form)
              Alpine.store('toast').show('success', t('group_created'))
            }
            this.showCreate = false
            await this.load(true)
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          } finally {
            this.saving = false
          }
        },
      }
    }

    function groupDetailPage() {
      return {
        group: null,
        instances: [],
        metrics: null,
        tab: 'tab_instances',
        loading: true,
        showAddInstance: false,
        instForm: { display_name: '', priority: 1, daily_budget: 200, hourly_budget: 30 },
        _lastGroupId: null,

        async load(groupId) {
          if (!groupId || groupId === this._lastGroupId) return
          this._lastGroupId = groupId
          this.loading = true
          try {
            const [groupRes, instancesRes] = await Promise.all([
              Api.getGroup(groupId),
              Api.listInstances(groupId),
            ])
            this.group = groupRes?.data
            this.instances = instancesRes?.data || []
            Api.getGroupMetrics(groupId).then(r => this.metrics = r?.data).catch(() => {})
          } catch (err) {
            Alpine.store('toast').show('error', t('group_load_error'))
          } finally {
            this.loading = false
          }
        },

        resetInstanceForm() {
          const s = this.group?.strategy
          this.instForm = {
            display_name: '',
            priority: s === 'rotation' ? 0 : (this.instances.length + 1),
            daily_budget: s === 'failover' ? 1000 : 200,
            hourly_budget: s === 'failover' ? 200 : 30,
          }
        },

        async addInstance() {
          try {
            await Api.createInstance(this._lastGroupId, this.instForm)
            Alpine.store('toast').show('success', t('instance_created'))
            this.showAddInstance = false
            const res = await Api.listInstances(this._lastGroupId)
            this.instances = res?.data || []
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          }
        },

        async connectInst(id) {
          try {
            await Api.connectInstance(id)
            Alpine.store('toast').show('success', t('connecting'))
            setTimeout(() => this.refreshInstances(), 2000)
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          }
        },

        async disconnectInst(id) {
          try {
            await Api.disconnectInstance(id)
            Alpine.store('toast').show('success', t('disconnected'))
            setTimeout(() => this.refreshInstances(), 1000)
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          }
        },

        async refreshInstances() {
          const res = await Api.listInstances(this._lastGroupId)
          this.instances = res?.data || []
        },

        async doPause() {
          try {
            await Api.pauseGroup(this._lastGroupId)
            this.group = { ...this.group, is_active: false }
            Alpine.store('toast').show('success', t('group_paused'))
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },

        async doResume() {
          try {
            await Api.resumeGroup(this._lastGroupId)
            this.group = { ...this.group, is_active: true }
            Alpine.store('toast').show('success', t('group_resumed'))
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },

        async doDelete() {
          try {
            await Api.deleteGroup(this._lastGroupId)
            Alpine.store('toast').show('success', t('group_deleted'))
            this._lastGroupId = null
            Alpine.store('router').navigate('groups')
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },
      }
    }

    function instanceDetailPage() {
      return {
        instance: null,
        loading: true,
        showQR: false,
        qrData: null,
        qrLoading: false,
        qrError: '',
        qrInterval: null,
        pairPhone: '',
        pairCode: '',
        _lastId: null,

        async load(instanceId) {
          if (!instanceId || instanceId === this._lastId) return
          this._lastId = instanceId
          this.loading = true
          try {
            const res = await Api.getInstance(instanceId)
            this.instance = res?.data
          } catch (err) {
            Alpine.store('toast').show('error', t('instance_load_error'))
          } finally {
            this.loading = false
          }
        },

        async loadQR() {
          this.qrLoading = true
          this.qrError = ''
          this.qrData = null
          try {
            const res = await Api.getQRCode(this._lastId)
            this.qrData = res?.data?.qr_base64
            if (!this.qrData) {
              this.qrError = res?.data?.status === 'already_connected' ? t('already_connected') : t('qr_not_available')
              if (res?.data?.status === 'already_connected') {
                this.showQR = false
                await this.load(this._lastId)
                this._lastId = null
                await this.load(Alpine.store('router').params.instanceId)
              }
            }
            this.startQRPolling()
          } catch (err) {
            this.qrError = err.message
          } finally {
            this.qrLoading = false
          }
        },

        startQRPolling() {
          this.stopQRPolling()
          this.qrInterval = setInterval(async () => {
            try {
              const status = await Api.getInstanceStatus(this._lastId)
              if (status?.data?.status === 'available') {
                this.showQR = false
                this.stopQRPolling()
                Alpine.store('toast').show('success', t('whatsapp_connected'))
                this._lastId = null
                await this.load(Alpine.store('router').params.instanceId)
              }
            } catch {}
          }, 5000)
        },

        stopQRPolling() {
          if (this.qrInterval) {
            clearInterval(this.qrInterval)
            this.qrInterval = null
          }
        },

        async doConnect() {
          try {
            await Api.connectInstance(this._lastId)
            Alpine.store('toast').show('success', t('connecting'))
            this.showQR = true
            this.loadQR()
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },

        async doDisconnect() {
          try {
            await Api.disconnectInstance(this._lastId)
            this.instance = { ...this.instance, status: 'disconnected' }
            Alpine.store('toast').show('success', t('disconnected'))
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },

        async doRestart() {
          try {
            await Api.restartInstance(this._lastId)
            Alpine.store('toast').show('info', t('restarting'))
            setTimeout(async () => {
              this._lastId = null
              await this.load(Alpine.store('router').params.instanceId)
            }, 3000)
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },

        async doPair() {
          if (!this.pairPhone.trim()) return
          try {
            const res = await Api.pairPhone(this._lastId, this.pairPhone.trim())
            this.pairCode = res?.data?.code || res?.data?.pairing_code || ''
            if (this.pairCode) {
              Alpine.store('toast').show('success', t('code_generated'))
            }
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },

        async doDeleteInstance() {
          try {
            await Api.deleteInstance(this._lastId)
            Alpine.store('toast').show('success', t('instance_deleted'))
            Alpine.store('router').navigate('group-detail', { groupId: Alpine.store('router').params.groupId })
          } catch (err) { Alpine.store('toast').show('error', err.message) }
        },
      }
    }

    function broadcastsPage() {
      return {
        groups: [],
        broadcasts: [],
        selectedGroup: '',
        loading: false,
        sending: false,
        showCreate: false,
        recipientCount: 0,
        form: { message: '', recipients: '', shuffle: true, spintax: false, skipInvalid: true, skipNonWhatsapp: false },
        _loaded: false,
        _refreshTimer: null,

        async load() {
          if (this._loaded) return
          this._loaded = true
          try {
            const res = await Api.listGroups()
            this.groups = res?.data || []
          } catch {}
        },

        async loadBroadcasts() {
          if (!this.selectedGroup) { this.broadcasts = []; return }
          this.loading = true
          try {
            const res = await Api.listBroadcasts(this.selectedGroup)
            this.broadcasts = res?.data || []
            this.startAutoRefresh()
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          } finally {
            this.loading = false
          }
        },

        startAutoRefresh() {
          this.stopAutoRefresh()
          const hasActive = this.broadcasts.some(bc => bc.status === 'processing' || bc.status === 'pending')
          if (hasActive) {
            this._refreshTimer = setInterval(() => this.loadBroadcasts(), 5000)
          }
        },

        stopAutoRefresh() {
          if (this._refreshTimer) {
            clearInterval(this._refreshTimer)
            this._refreshTimer = null
          }
        },

        updateRecipientCount() {
          const lines = this.form.recipients.split('\n').filter(l => l.trim().length > 0)
          this.recipientCount = lines.length
        },

        parseRecipients() {
          return this.form.recipients
            .split('\n')
            .map(l => l.trim().replace(/\D/g, ''))
            .filter(l => l.length > 0)
        },

        resetForm() {
          this.form = { message: '', recipients: '', shuffle: true, spintax: false, skipInvalid: true, skipNonWhatsapp: false }
          this.recipientCount = 0
        },

        async createBroadcast() {
          const recipients = this.parseRecipients()
          if (recipients.length === 0) return
          this.sending = true
          try {
            const payload = {
              recipients,
              type: 'text',
              content: { text: this.form.message },
              options: {
                shuffle_recipients: this.form.shuffle,
                spintax: this.form.spintax,
                skip_invalid_numbers: this.form.skipInvalid,
                skip_non_whatsapp: this.form.skipNonWhatsapp,
              },
            }
            const res = await Api.createBroadcast(this.selectedGroup, payload)
            const mins = res?.data?.estimated_duration_minutes || 0
            Alpine.store('toast').show('success', `${t('broadcast_created')} — ~${mins} ${t('minutes')}`, 6000)
            this.showCreate = false
            this.resetForm()
            await this.loadBroadcasts()
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          } finally {
            this.sending = false
          }
        },

        async pauseBroadcast(bc) {
          try {
            await Api.pauseBroadcast(this.selectedGroup, bc.id)
            Alpine.store('toast').show('success', t('broadcast_paused'))
            await this.loadBroadcasts()
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          }
        },

        async resumeBroadcast(bc) {
          try {
            await Api.resumeBroadcast(this.selectedGroup, bc.id)
            Alpine.store('toast').show('success', t('broadcast_resumed'))
            await this.loadBroadcasts()
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          }
        },

        async cancelBroadcast(bc) {
          if (!confirm(t('confirm_cancel_broadcast'))) return
          try {
            await Api.cancelBroadcast(this.selectedGroup, bc.id)
            Alpine.store('toast').show('success', t('broadcast_cancelled'))
            await this.loadBroadcasts()
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          }
        },

        async refreshStatus(bc) {
          try {
            const res = await Api.getBroadcast(this.selectedGroup, bc.id)
            if (res?.data) {
              this.broadcasts = this.broadcasts.map(b => b.id === bc.id ? { ...b, ...res.data } : b)
            }
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          }
        },
      }
    }

    function logsPage() {
      return {
        logs: [],
        loading: true,
        levelFilter: '',
        limitFilter: '100',
        search: '',
        autoRefresh: false,
        _refreshInterval: null,
        _loaded: false,

        async load(force) {
          if (this._loaded && !force) return
          this._loaded = true
          this.loading = true
          try {
            const params = { limit: this.limitFilter }
            if (this.levelFilter) params.level = this.levelFilter
            const res = await Api.getLogs(params)
            this.logs = (res?.data || []).map(l => ({ ...l, _expanded: false }))
          } catch (err) {
            Alpine.store('toast').show('error', err.message)
          } finally {
            this.loading = false
          }
        },

        filteredLogs() {
          if (!this.search) return this.logs
          const q = this.search.toLowerCase()
          return this.logs.filter(l =>
            (l.message || '').toLowerCase().includes(q) ||
            (l.caller || '').toLowerCase().includes(q) ||
            JSON.stringify(l.fields || {}).toLowerCase().includes(q)
          )
        },

        formatLogTime(ts) {
          if (!ts) return ''
          const d = new Date(ts)
          const locale = getLang() === 'en' ? 'en-US' : 'pt-BR'
          return d.toLocaleString(locale, { hour12: false })
        },

        toggleAutoRefresh() {
          if (this.autoRefresh) {
            this._refreshInterval = setInterval(() => this.load(true), 5000)
          } else if (this._refreshInterval) {
            clearInterval(this._refreshInterval)
            this._refreshInterval = null
          }
        },
      }
    }
  </script>
